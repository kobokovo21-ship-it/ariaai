<script>
let allLeads = [];
let editId = null;
const authToken = localStorage.getItem('virgo_token');

if (!authToken) {
  document.getElementById('login-wall').style.display = 'flex';
} else {
  loadLeads();
}

async function loadLeads() {
  try {
    const r = await fetch('/api/leads-api', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (r.status === 401 || r.status === 403) {
      document.getElementById('login-wall').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      return;
    }
    document.getElementById('app').style.display = 'block';
    allLeads = await r.json();
    if (!Array.isArray(allLeads)) allLeads = [];
    renderStats();
    renderTable(allLeads);
  } catch(e) {
    document.getElementById('leads-table').innerHTML = '<tr><td colspan="7" class="empty">Fehler beim Laden</td></tr>';
  }
}

function renderStats() {
  document.getElementById('s-total').textContent = allLeads.length;
  document.getElementById('s-neu').textContent = allLeads.filter(l=>l.status==='neu').length;
  document.getElementById('s-kontaktiert').textContent = allLeads.filter(l=>l.status==='kontaktiert').length;
  document.getElementById('s-abschluss').textContent = allLeads.filter(l=>l.status==='abschluss').length;
}

function renderTable(leads) {
  const tbody = document.getElementById('leads-table');
  if (!leads.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">Noch keine Leads.</td></tr>'; return; }
  tbody.innerHTML = leads.map(l => `<tr>
    <td><strong>${l.name}</strong></td>
    <td>${l.versicherung}</td>
    <td><a href="tel:${l.telefon}" style="color:var(--blue);text-decoration:none">${l.telefon}</a></td>
    <td>${l.email||'—'}</td>
    <td><span class="badge ${l.status}">${l.status}</span></td>
    <td>${new Date(l.created_at).toLocaleDateString('de')}</td>
    <td><div class="act">
      <button onclick="editLead('${l.id}')">✏️</button>
      <button onclick="window.open('tel:${l.telefon}')">📞</button>
      <button class="del" onclick="deleteLead('${l.id}')">🗑️</button>
    </div></td>
  </tr>`).join('');
}

function filterLeads() {
  const q = document.getElementById('search').value.toLowerCase();
  const v = document.getElementById('filter-vers').value;
  const s = document.getElementById('filter-status').value;
  renderTable(allLeads.filter(l => {
    const mq = !q || l.name.toLowerCase().includes(q) || l.telefon.includes(q) || (l.email||'').toLowerCase().includes(q);
    return mq && (!v||l.versicherung===v) && (!s||l.status===s);
  }));
}

function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Neuer Lead';
  ['f-name','f-tel','f-email','f-notiz'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-vers').value = 'PKV';
  document.getElementById('f-status').value = 'neu';
  document.getElementById('modal-msg').style.display = 'none';
  document.getElementById('modal').classList.add('vis');
}

function editLead(id) {
  const l = allLeads.find(x=>x.id===id); if(!l) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Lead bearbeiten';
  document.getElementById('f-name').value = l.name;
  document.getElementById('f-tel').value = l.telefon;
  document.getElementById('f-email').value = l.email||'';
  document.getElementById('f-vers').value = l.versicherung;
  document.getElementById('f-status').value = l.status;
  document.getElementById('f-notiz').value = l.notiz||'';
  document.getElementById('modal-msg').style.display = 'none';
  document.getElementById('modal').classList.add('vis');
}

function closeModal() { document.getElementById('modal').classList.remove('vis'); }

async function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  const telefon = document.getElementById('f-tel').value.trim();
  const msg = document.getElementById('modal-msg');
  if (!name||!telefon) { msg.textContent='Name und Telefon sind Pflichtfelder.'; msg.style.display='block'; return; }
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='...';
  const body = {
    name, telefon,
    email: document.getElementById('f-email').value.trim()||null,
    versicherung: document.getElementById('f-vers').value,
    status: document.getElementById('f-status').value,
    notiz: document.getElementById('f-notiz').value.trim()||null
  };
  try {
    const method = editId ? 'PUT' : 'POST';
    if (editId) body.id = editId;
    const r = await fetch('/api/leads-api', {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.error) { msg.textContent=d.error; msg.style.display='block'; btn.disabled=false; btn.textContent='Speichern'; return; }
    closeModal();
    loadLeads();
  } catch(e) { msg.textContent='Fehler beim Speichern.'; msg.style.display='block'; }
  btn.disabled=false; btn.textContent='Speichern';
}

async function deleteLead(id) {
  if (!confirm('Lead wirklich löschen?')) return;
  const r = await fetch('/api/leads-api', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
    body: JSON.stringify({ id })
  });
  if (r.ok) {
    loadLeads();
  } else {
    const d = await r.json().catch(() => ({}));
    alert('Fehler beim Löschen: ' + (d.error || 'Unbekannter Fehler'));
  }
}

document.getElementById('modal').addEventListener('click', function(e) { if(e.target===this)closeModal(); });
</script>
