<script>
let selectedColor = '#111111';
let authToken = localStorage.getItem('virgo_token');
let plan = 'free';

const MAKLER_PLANS = ['makler-starter', 'makler-pro', 'makler-business'];

async function checkAccess() {
  if (!authToken) { window.location.href = '/makler-login.html?redirect=/makler-onboarding.html'; return; }
  try {
    const r = await fetch('/api/credits', { headers: { 'Authorization': 'Bearer ' + authToken } });
    if (!r.ok) { document.getElementById('no-access').style.display = 'block'; return; }
    const d = await r.json();
    plan = d.plan || 'free';
    if (!MAKLER_PLANS.includes(plan) && !d.is_admin) {
      document.getElementById('no-access').style.display = 'block';
      return;
    }
    document.getElementById('app').style.display = 'block';
    const planNames = {'makler-starter':'Makler Starter','makler-pro':'Makler Pro','makler-business':'Makler Business'};
    document.getElementById('plan-badge').textContent = planNames[plan] || 'Makler';
    loadProfile();
  } catch(e) { document.getElementById('no-access').style.display = 'block'; }
}
checkAccess();

async function loadProfile() {
  if (!authToken) return;
  try {
    const r = await fetch('/api/tools?tool=makler-mine', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    const d = await r.json();
    if (d && d.name) {
      document.getElementById('name').value = d.name || '';
      document.getElementById('firma').value = d.firma || '';
      document.getElementById('telefon').value = d.telefon || '';
      document.getElementById('email').value = d.email || '';
      document.getElementById('slug').value = d.slug || '';
      document.getElementById('beschreibung').value = d.beschreibung || '';
      if (d.farbe) setColorByValue(d.farbe);
      if (d.versicherungen) {
        d.versicherungen.forEach(v => {
          const cb = document.querySelector(`input[value="${v}"]`);
          if (cb) cb.checked = true;
        });
      }
      updatePreview();
    }
  } catch(e) {}
}

function updatePreview() {
  const slug = document.getElementById('slug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  document.getElementById('slug').value = slug;
  if (slug) {
    document.getElementById('preview-box').style.display = 'block';
    document.getElementById('preview-url').textContent = 'virgoio.com/makler/' + slug;
    document.getElementById('preview-link').href = '/makler/' + slug;
  } else {
    document.getElementById('preview-box').style.display = 'none';
  }
}

function setColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  selectedColor = el.dataset.color;
}

function setColorByValue(color) {
  const swatch = document.querySelector(`.color-swatch[data-color="${color}"]`);
  if (swatch) { document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')); swatch.classList.add('active'); }
  selectedColor = color;
}

function copyLink() {
  const slug = document.getElementById('slug').value.trim();
  if (!slug) return;
  navigator.clipboard.writeText('https://virgoio.com/makler/' + slug);
  alert('Link kopiert!');
}

let generatedImageUrl = '';
let activeImgTab = 'ai';

function switchImgTab(tab) {
  activeImgTab = tab;
  document.getElementById('tab-ai-content').style.display = tab === 'ai' ? 'block' : 'none';
  document.getElementById('tab-upload-content').style.display = tab === 'upload' ? 'block' : 'none';
  document.getElementById('tab-ai').style.background = tab === 'ai' ? 'var(--t)' : 'var(--bg)';
  document.getElementById('tab-ai').style.color = tab === 'ai' ? '#fff' : 'var(--tm)';
  document.getElementById('tab-ai').style.borderColor = tab === 'ai' ? 'var(--t)' : 'var(--bd)';
  document.getElementById('tab-upload').style.background = tab === 'upload' ? 'var(--t)' : 'var(--bg)';
  document.getElementById('tab-upload').style.color = tab === 'upload' ? '#fff' : 'var(--tm)';
  document.getElementById('tab-upload').style.borderColor = tab === 'upload' ? 'var(--t)' : 'var(--bd)';
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Datei zu groß — max. 5MB'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    generatedImageUrl = e.target.result;
    document.getElementById('upload-img').src = e.target.result;
    document.getElementById('upload-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function generateHeaderImage() {
  const btn = document.getElementById('gen-img-btn');
  const versicherungen = Array.from(document.querySelectorAll('input[name="vers"]:checked')).map(cb => cb.value);
  const customPrompt = document.getElementById('img-prompt-custom').value.trim();
  const versStr = versicherungen.length ? versicherungen.join(', ') : 'Versicherung';
  const prompt = customPrompt
    ? customPrompt + ', professional photography, high quality, 16:9, no text'
    : `Professional background for ${versStr} insurance advisor, modern clean design, trust and security, high-end photography, 16:9 ratio, no people, no text`;
  btn.disabled = true;
  btn.textContent = '⏳ Generiert...';
  try {
    const r = await fetch('/api/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model: 'nano', negative_prompt: 'text, watermark, logo, people, face, letters' })
    });
    const d = await r.json();
    if (d.imageUrl) {
      generatedImageUrl = d.imageUrl;
      document.getElementById('ai-img').src = d.imageUrl;
      document.getElementById('ai-img-preview').style.display = 'block';
      btn.textContent = '✨ Neu generieren';
    } else {
      btn.textContent = '✨ KI-Bild generieren';
      alert('Fehler: ' + (d.error || 'Bild konnte nicht generiert werden'));
    }
  } catch(e) {
    btn.textContent = '✨ KI-Bild generieren';
    alert('Verbindungsfehler');
  }
  btn.disabled = false;
}

function showPreview() {
  const name = document.getElementById('name').value.trim() || 'Dein Name';
  const firma = document.getElementById('firma').value.trim() || 'Versicherungsmakler';
  const beschreibung = document.getElementById('beschreibung').value.trim() || 'Kostenlose und unverbindliche Beratung.';
  const versicherungen = Array.from(document.querySelectorAll('input[name="vers"]:checked')).map(cb => cb.value);
  const previewHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#fff;color:#111}.hero{padding:60px 20px 40px;text-align:center}.badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;border:1px solid ${selectedColor};color:${selectedColor}}h1{font-size:32px;font-weight:700;margin-bottom:12px}p{font-size:15px;color:#666;line-height:1.7;max-width:500px;margin:0 auto 24px}.av{width:48px;height:48px;border-radius:50%;background:${selectedColor};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin-right:10px}.makler-row{display:inline-flex;align-items:center;padding:10px 20px;border-radius:40px;border:1px solid #e8e8e8;background:#f7f7f7;margin-bottom:24px}.tag{padding:6px 14px;border-radius:20px;border:1px solid #e8e8e8;font-size:12px;color:#666;margin:4px}.form-card{max-width:500px;margin:0 auto 40px;padding:32px;border:1px solid #e8e8e8;border-radius:16px}.btn{width:100%;padding:14px;background:${selectedColor};color:#fff;border:none;border-radius:10px;font-family:Inter,sans-serif;font-size:14px;font-weight:600;cursor:pointer}input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid #e8e8e8;border-radius:8px;font-family:Inter,sans-serif;font-size:13px;outline:none;margin-bottom:12px}label{display:block;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}</style></head><body><div class="hero"><div class="badge">Kostenlose Beratung</div><h1>Versicherungsberatung mit ${name}</h1><p>${beschreibung}</p><div class="makler-row"><div class="av">${name[0]?.toUpperCase()||'M'}</div><div style="text-align:left"><div style="font-size:13px;font-weight:600">${name}</div><div style="font-size:11px;color:#888">${firma}</div></div></div><div>${versicherungen.map(v=>`<span class="tag">${v}</span>`).join('')}</div></div><div style="padding:0 20px"><div class="form-card"><h2 style="font-size:20px;font-weight:600;margin-bottom:16px">Jetzt kostenlose Beratung anfragen</h2><label>Dein Name *</label><input placeholder="Max Mustermann"><label>Telefon *</label><input placeholder="+49 ..."><label>Email</label><input placeholder="max@email.de"><label>Versicherung</label><select><option>Versicherung wählen...</option>${versicherungen.map(v=>`<option>${v}</option>`).join('')}</select><label>Nachricht</label><textarea placeholder="Was möchtest du wissen?" style="min-height:70px;resize:vertical;margin-bottom:16px"></textarea><button class="btn">Kostenlose Beratung anfragen →</button></div></div></body></html>`;
  document.getElementById('preview-frame').srcdoc = previewHTML;
  document.getElementById('preview-modal').style.display = 'block';
}

async function saveProfile() {
  const name = document.getElementById('name').value.trim();
  const slug = document.getElementById('slug').value.trim();
  const telefon = document.getElementById('telefon').value.trim();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!name || !slug || !telefon || !email) {
    msg.textContent = 'Bitte Name, URL, Telefon und Email ausfüllen.';
    msg.className = 'msg error'; msg.style.display = 'block'; return;
  }
  const versicherungen = Array.from(document.querySelectorAll('input[name="vers"]:checked')).map(cb => cb.value);
  if (!versicherungen.length) {
    msg.textContent = 'Bitte mindestens eine Versicherungsart auswählen.';
    msg.className = 'msg error'; msg.style.display = 'block'; return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Wird gespeichert...';
  msg.style.display = 'none';
  try {
    const r = await fetch('/api/tools', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ tool: 'makler-save', name, slug, telefon, email, firma: document.getElementById('firma').value.trim(), beschreibung: document.getElementById('beschreibung').value.trim(), versicherungen, farbe: selectedColor, header_image: generatedImageUrl || null })
    });
    const d = await r.json();
    if (d.error) {
      msg.textContent = d.error;
      msg.className = 'msg error'; msg.style.display = 'block';
    } else {
      msg.textContent = '✅ Profil gespeichert! Deine Landing Page ist jetzt live.';
      msg.className = 'msg success'; msg.style.display = 'block';
      updatePreview();
    }
  } catch(e) {
    msg.textContent = 'Fehler: ' + e.message;
    msg.className = 'msg error'; msg.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Profil speichern & Live schalten';
}
</script>
