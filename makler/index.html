<script>
let maklerData = null;

async function loadMakler() {
  const path = window.location.pathname;
  const slug = path.split('/makler/')[1]?.replace(/\//g,'');
  if (!slug || !/^[a-z0-9-]+$/.test(slug)) { showNotFound(); return; }

  try {
    const r = await fetch('/api/tools?tool=makler-get&slug=' + slug);
    if (!r.ok) { showNotFound(); return; }
    const data = await r.json();
    if (!data || data.error) { showNotFound(); return; }
    maklerData = data;
    renderPage(data);
  } catch(e) { showNotFound(); }
}

function renderPage(d) {
  document.title = (d.name || 'Makler') + ' — Versicherungsberatung';
  document.documentElement.style.setProperty('--color', d.farbe || '#111');

  if (d.header_image) {
    const imgEl = document.createElement('img');
    imgEl.src = d.header_image;
    imgEl.style.cssText = 'width:100%;height:220px;object-fit:cover;margin-bottom:24px;border-radius:12px';
    const hero = document.querySelector('.hero');
    hero.insertBefore(imgEl, hero.firstChild);
  }
  document.getElementById('hero-badge').style.borderColor = d.farbe || '#111';
  document.getElementById('hero-badge').style.color = d.farbe || '#111';
  document.getElementById('hero-title').textContent = 'Versicherungsberatung mit ' + d.name;
  document.getElementById('hero-desc').textContent = d.beschreibung || 'Kostenlose und unverbindliche Beratung.';
  document.getElementById('makler-av').textContent = d.name[0].toUpperCase();
  document.getElementById('makler-av').style.background = d.farbe || '#111';
  document.getElementById('makler-name').textContent = d.name;
  document.getElementById('makler-firma').textContent = d.firma || 'Versicherungsmakler';

  const tags = document.getElementById('vers-tags');
  (d.versicherungen || []).forEach(v => {
    const tag = document.createElement('span');
    tag.className = 'vers-tag';
    tag.textContent = v;
    tags.appendChild(tag);
  });

  const select = document.getElementById('f-vers');
  select.innerHTML = '<option value="">Versicherung wählen...</option>';
  (d.versicherungen || []).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    select.appendChild(opt);
  });

  const btn = document.getElementById('submit-btn');
  btn.style.background = d.farbe || '#111';
  btn.style.color = '#fff';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'block';
}

async function submitLead() {
  const name = document.getElementById('f-name').value.trim();
  const tel = document.getElementById('f-tel').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const vers = document.getElementById('f-vers').value;
  const msg = document.getElementById('f-msg').value.trim();

  if (!name || !tel) { alert('Bitte Name und Telefon ausfüllen.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Wird gesendet...';

  try {
    const r = await fetch('/api/tools', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tool: 'makler-lead',
        makler_id: maklerData?.id,
        makler_email: maklerData?.email,
        makler_name: maklerData?.name,
        name, telefon: tel, email, versicherung: vers, nachricht: msg
      })
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('form-content').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('success-name').textContent = maklerData?.name || 'Der Makler';
    } else {
      alert(d.error || 'Fehler beim Senden.');
      btn.disabled = false; btn.textContent = 'Kostenlose Beratung anfragen →';
    }
  } catch(e) {
    alert('Verbindungsfehler.');
    btn.disabled = false; btn.textContent = 'Kostenlose Beratung anfragen →';
  }
}

function showNotFound() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
}

loadMakler();
</script>
