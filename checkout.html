<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRGO – Checkout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111111;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .checkout-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
  }
  h2 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #ffffff;
    font-weight: 600;
  }
  .plan-info {
    color: #888;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .price {
    font-size: 36px;
    color: #ffffff;
    font-weight: 700;
    margin-bottom: 32px;
  }
  .price span {
    font-size: 14px;
    color: #888;
    font-weight: 400;
  }
  .consent-block {
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .consent-item {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    cursor: pointer;
    align-items: flex-start;
  }
  .consent-item:last-child { margin-bottom: 0; }
  .consent-item input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-top: 2px;
    accent-color: #4a9eff;
    cursor: pointer;
    flex-shrink: 0;
  }
  .consent-item label {
    font-size: 13px;
    line-height: 1.5;
    color: #c5c5c5;
    cursor: pointer;
  }
  .consent-item a {
    color: #4a9eff;
    text-decoration: underline;
  }
  .buy-button {
    width: 100%;
    background: #ffffff;
    color: #111111;
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .buy-button:hover:not(:disabled) {
    background: #f0f0f0;
    transform: translateY(-1px);
  }
  .buy-button:disabled {
    background: #2a2a2a;
    color: #555;
    cursor: not-allowed;
  }
  .legal-note {
    font-size: 11px;
    color: #666;
    margin-top: 16px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="checkout-card">
  <h2>VIRGO Pro</h2>
  <p class="plan-info">2.000 Credits / Monat · Jederzeit kündbar</p>

  <div class="price">49,99 € <span>/Monat</span></div>

  <div class="consent-block">
    <div class="consent-item">
      <input type="checkbox" id="consent-agb" />
      <label for="consent-agb">
        Ich habe die <a href="/agb.html" target="_blank">AGB</a>, 
        <a href="/datenschutz.html" target="_blank">Datenschutzerklärung</a> und 
        <a href="/widerrufsbelehrung.html" target="_blank">Widerrufsbelehrung</a> 
        gelesen und akzeptiere sie.
      </label>
    </div>

    <div class="consent-item">
      <input type="checkbox" id="consent-widerruf" />
      <label for="consent-widerruf">
        Ich verlange ausdrücklich, dass VIRGO mit der Ausführung des Vertrags 
        sofort beginnt. Mir ist bekannt, dass ich mein Widerrufsrecht verliere, 
        sobald die digitale Leistung vollständig erbracht ist (z. B. bei 
        Nutzung der Credits oder Generierung von Inhalten).
      </label>
    </div>
  </div>

  <button class="buy-button" id="buy-btn" disabled onclick="handlePurchase()">
    Jetzt kaufen – 49,99 €
  </button>

  <p class="legal-note">
    Sichere Zahlung über Stripe · SSL-verschlüsselt
  </p>
</div>

<script>
  const checkboxAgb = document.getElementById('consent-agb');
  const checkboxWiderruf = document.getElementById('consent-widerruf');
  const buyButton = document.getElementById('buy-btn');

  // Button erst aktiv wenn BEIDE Checkboxen angeklickt
  function updateButton() {
    buyButton.disabled = !(checkboxAgb.checked && checkboxWiderruf.checked);
  }

  checkboxAgb.addEventListener('change', updateButton);
  checkboxWiderruf.addEventListener('change', updateButton);

  // Zustimmung speichern (wichtig für rechtlichen Nachweis)
  function handlePurchase() {
    if (!checkboxAgb.checked || !checkboxWiderruf.checked) return;

    // Consent-Daten erstellen
    const consentRecord = {
      timestamp: new Date().toISOString(),
      agb_accepted: true,
      widerruf_waived: true,
      plan: 'VIRGO Pro',
      price: '49.99 EUR',
      user_agent: navigator.userAgent,
      ip: 'wird-server-seitig-erfasst'
    };

    // In localStorage für Frontend-Tracking
    localStorage.setItem('virgo_consent', JSON.stringify(consentRecord));

    // WICHTIG: Diese Daten musst du auch an dein Backend senden 
    // und in deiner Datenbank speichern (z. B. Vercel KV, Supabase, MongoDB)
    // Beispiel:
    /*
    fetch('/api/save-consent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(consentRecord)
    });
    */

    // Weiterleitung zu Stripe Payment Link
    // Hier deine echte Stripe-URL eintragen:
    window.location.href = 'https://buy.stripe.com/DEINE-PRO-PAYMENT-LINK';
  }
</script>

</body>
</html>
